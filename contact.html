<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — Dylan Thomas</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* (ALL YOUR ORIGINAL CSS — unchanged) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0b09;--bg2:#141210;--bg3:#1c1915;
  --amber:#e8a020;--cream:#f0e8d8;--muted:#6b6358;--muted2:#9a9088;--border:#2a2520;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--cream);font-family:var(--font-body);line-height:1.7}

/* keep rest of your CSS exactly the same */
</style>
</head>

<body>

<!-- NAV (unchanged) -->
<nav>
  <a href="index.html" class="nav-logo">Dylan<span>.</span>Thomas</a>
</nav>

<!-- HERO -->
<div class="page-hero">
  <p class="page-eyebrow">// Let's Connect</p>
  <h1 class="page-title">Let's build<br>something <em>great.</em></h1>
</div>

<!-- CONTACT -->
<section class="contact-section">
  <div class="contact-grid">

    <!-- FORM -->
    <div>
      <div class="contact-form-wrap">

        <!-- ✅ REAL FORM START -->
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

          <div class="form-title">Send a Message</div>
          <div class="form-sub">Tell me about your project and I'll get back to you.</div>

          <div class="form-row">
            <input class="form-input" type="text" name="first_name" placeholder="First Name" required>
            <input class="form-input" type="text" name="last_name" placeholder="Last Name">
          </div>

          <input class="form-input" type="email" name="email" placeholder="Email" required>

          <select class="form-select form-input" name="project_type">
            <option disabled selected>Select project</option>
            <option>Website</option>
            <option>App</option>
            <option>Full Stack</option>
          </select>

          <input class="form-input" type="text" name="subject" placeholder="Subject">

          <textarea class="form-textarea" name="message" placeholder="Your message..." required></textarea>

          <!-- SENDS TO YOUR EMAIL -->
          <input type="hidden" name="_to" value="deadwooddigital2026@gmail.com">

          <button type="submit" class="form-submit">
            Send Message →
          </button>

        </form>
        <!-- ✅ REAL FORM END -->

      </div>
    </div>

  </div>
</section>

</body>
</html>
