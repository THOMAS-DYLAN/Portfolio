<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — Dylan Thomas</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* KEEPING YOUR ORIGINAL CSS (trimmed slightly for clarity but unchanged behavior) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0b09;--bg2:#141210;--bg3:#1c1915;
  --amber:#e8a020;--cream:#f0e8d8;--muted:#6b6358;--muted2:#9a9088;--border:#2a2520;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--cream);font-family:var(--font-body);line-height:1.7}

/* NAV */
nav{padding:20px 40px;border-bottom:1px solid var(--border)}
.nav-logo{color:var(--cream);text-decoration:none;font-family:var(--font-display);font-weight:700}

/* HERO */
.page-hero{padding:120px 40px 60px}
.page-title{font-family:var(--font-display);font-size:3rem}
.page-title em{color:var(--amber)}

/* FORM */
.contact-section{padding:40px}
.contact-form-wrap{background:var(--bg2);border:1px solid var(--border);padding:40px;max-width:600px}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--cream);padding:14px;margin-bottom:16px
}
.form-submit{background:var(--amber);border:none;padding:16px;width:100%;cursor:pointer}
.form-submit:hover{background:var(--cream)}

.form-success{display:none;text-align:center;padding:40px}
.form-success.show{display:block}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Dylan<span>.</span>Thomas</a>
</nav>

<div class="page-hero">
  <h1 class="page-title">Let's build something <em>great.</em></h1>
</div>

<section class="contact-section">

<div class="contact-form-wrap">

<!-- ✅ REAL FORM -->
<form id="contactForm" action="https://formbold.com/s/3A7EW" method="POST">

  <div id="formWrap">

    <input type="text" name="first_name" class="form-input" placeholder="First Name" required>
    <input type="text" name="last_name" class="form-input" placeholder="Last Name">

    <input type="email" name="email" class="form-input" placeholder="Email" required>

    <select name="project_type" class="form-select" required>
      <option value="" disabled selected>Select project</option>
      <option>Website</option>
      <option>App</option>
      <option>Full Stack</option>
    </select>

    <input type="text" name="subject" class="form-input" placeholder="Subject">

    <textarea name="message" class="form-textarea" placeholder="Your message..." required></textarea>

    <button type="submit" class="form-submit">Send Message →</button>

  </div>

</form>

<!-- SUCCESS STATE -->
<div class="form-success" id="formSuccess">
  <h2>Message Sent!</h2>
  <p>I’ll get back to you within 24 hours.</p>
</div>

</div>
</section>

<script>
// Optional: smooth submit (no page reload)
const form = document.getElementById("contactForm");
const success = document.getElementById("formSuccess");
const wrap = document.getElementById("formWrap");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const data = new FormData(form);

  try {
    await fetch(form.action, {
      method: "POST",
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    wrap.style.display = "none";
    success.classList.add("show");

  } catch (err) {
    alert("Something went wrong. Try again.");
  }
});
</script>

</body>
</html>
